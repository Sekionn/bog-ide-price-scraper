spring.application.name=bog-ide-price-scraper
server.port=${SERVER_PORT:8080}

server.ssl.enabled=${SERVER_SSL_ENABLED:false}
server.ssl.key-store=${SERVER_SSL_KEY_STORE:}
server.ssl.key-store-password=${SERVER_SSL_KEY_STORE_PASSWORD:}
server.ssl.key-store-type=${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
server.ssl.key-alias=${SERVER_SSL_KEY_ALIAS:bog-ide-price-scraper}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bog_ide_prices}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bogide}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bogide}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.timeout=PT5S

# Default: four times per week at 20:00 Copenhagen time.
# Format: second minute hour day-of-month month day-of-week
scraper.schedule.cron=0 0 20 ? * MON,WEN,FRI,SUN
scraper.schedule.zone=Europe/Copenhagen

scraper.sitemap-index-url=https://www.bog-ide.dk/sitemap.xml
scraper.robots-txt-url=https://www.bog-ide.dk/robots.txt
scraper.allowed-product-url-prefix=https://www.bog-ide.dk/products/
scraper.product-sitemap-url-contains=sitemap_products_
scraper.user-agent=BogIdePriceScraper/1.0 (+private project; respectful tri weekly split crawl)

# Keep every outbound request polite: robots.txt, sitemaps, and product pages.
# The app also enforces scraper.minimum-request-delay to prevent accidental fast crawls.
scraper.request-delay=PT2S
scraper.minimum-request-delay=PT1S
scraper.request-timeout=PT20S
scraper.connect-timeout=PT10S
scraper.refresh-after=P7D
scraper.sitemap-cache-ttl=P7D
scraper.max-run-time=PT6H
scraper.cache-prefix=product-price

# Weekly sitemap discovery stores new product numbers and URLs as placeholder rows.
# Use /api/discovery/run?limit=10&overwriteExistingUrls=false to trigger this manually.
scraper.discovery-cron=0 0 19 ? * MON,THU
scraper.discovery-zone=Europe/Copenhagen
scraper.discovery-max-run-time=PT6H

# 0 means no limit. max-products-per-run applies to known-product refresh jobs.
# max-discovered-products-per-run applies to scheduled sitemap discovery.
# max-sitemaps-per-run applies to scheduled sitemap discovery.
scraper.max-sitemaps-per-run=0
scraper.max-products-per-run=0
scraper.max-discovered-products-per-run=0

management.endpoints.web.exposure.include=health,info
