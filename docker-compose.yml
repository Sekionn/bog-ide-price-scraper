services:
  mysql:
    image: mysql:8.4
    container_name: bog-ide-price-mysql
    environment:
      MYSQL_DATABASE: bog_ide_prices
      MYSQL_USER: bogide
      MYSQL_PASSWORD: bogide
      MYSQL_ROOT_PASSWORD: bogide-root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -ubogide -pbogide --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: bog-ide-price-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: bog-ide-price-scraper
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bog_ide_prices
      SPRING_DATASOURCE_USERNAME: bogide
      SPRING_DATASOURCE_PASSWORD: bogide
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SERVER_PORT: 8443
      SERVER_SSL_ENABLED: "true"
      SERVER_SSL_KEY_STORE: /app/certs/bog-ide-price-scraper.p12
      SERVER_SSL_KEY_STORE_PASSWORD: change-this-password
      SERVER_SSL_KEY_STORE_TYPE: PKCS12
      SERVER_SSL_KEY_ALIAS: bog-ide-price-scraper
    ports:
      - "8443:8443"

volumes:
  mysql-data:
  redis-data:
